<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" role="img" aria-label="griff labs">
  <style>
    .word {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-weight: 300;
      font-size: 72px;
      letter-spacing: -0.02em;
      fill: #e5e7eb;
    }
    .sub {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.32em;
      fill: #6b7280;
    }
    .rule {
      stroke: #e5e7eb;
      stroke-width: 1;
      fill: none;
      stroke-dasharray: 480;
      stroke-dashoffset: 480;
      animation: draw 2.4s cubic-bezier(0.65, 0, 0.35, 1) 0.3s forwards;
    }
    .dot {
      fill: #10b981;
      animation: pulse 2.6s ease-in-out 2.7s infinite;
      opacity: 0;
    }
    .fadein {
      opacity: 0;
      animation: fade 1.2s ease-out forwards;
    }
    .fadein-delay {
      opacity: 0;
      animation: fade 1.2s ease-out 1.6s forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes fade { to { opacity: 1; } }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; r: 3; }
      50%      { opacity: 1;    r: 4; }
    }
    @media (prefers-color-scheme: light) {
      .word { fill: #111827; }
      .sub  { fill: #6b7280; }
      .rule { stroke: #111827; }
    }
  </style>

  <g transform="translate(40, 0)">
    <text x="0" y="110" class="word fadein">griff labs</text>
    <line x1="6" y1="138" x2="486" y2="138" class="rule" />
    <circle cx="486" cy="138" r="3" class="dot" />
    <text x="6" y="172" class="sub fadein-delay">BIOTECH &#183; COMPUTATION &#183; ENGINEERING</text>
  </g>
</svg>
